name: 🦆 波波鴨每日選股

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install requests pandas numpy python-dateutil

      - name: 執行選股
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python src/run.py

      - name: 上傳 HTML 報告
        uses: actions/upload-artifact@v4
        with:
          name: 波波鴨選股報告
          path: report.html
          retention-days: 7
